<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>批量采集 · AssetVault Pro</title>
    <link rel="stylesheet" href="batch.css" />
  </head>
  <body>
    <header>
      <h1>批量采集</h1>
      <p id="pageInfo" class="page-info"></p>
      <div class="toolbar">
        <button id="rescan" type="button" title="从来源页重新扫描图片（适用于 SPA 懒加载）">重新扫描</button>
        <button id="selectAll" type="button">全选</button>
        <button id="selectNone" type="button">全不选</button>
        <button id="importSelected" type="button" class="primary">导入选中</button>
      </div>
      <!-- Filter Bar: 由 batch.ts 动态创建并插入到此处 (toolbar 之后, importStatus 之前) -->
      <!-- <div id="filterBar" class="bs-filter-bar"></div> -->
      <p id="importStatus" class="import-status"></p>
      <ul id="importDetails" class="import-details" hidden></ul>
      <details class="page-video-paste" id="pageVideoPaste">
        <summary>粘贴视频作品 URL（yt-dlp）</summary>
        <p class="page-video-hint">
          每行一个作品页链接（YouTube、B站、抖音、TikTok 含 vm.tiktok.com 短链等）。与上方图片批量导入无关。
        </p>
        <textarea
          id="pageVideoUrls"
          class="page-video-textarea"
          rows="4"
          spellcheck="false"
          placeholder="https://www.bilibili.com/video/BV…&#10;https://vm.tiktok.com/…"
        ></textarea>
        <div class="page-video-toolbar">
          <button id="importPageVideoUrls" type="button" class="primary">导入视频作品</button>
        </div>
        <p id="pageVideoStatus" class="page-video-status"></p>
      </details>
    </header>
    <main id="grid" class="grid"></main>
    <script type="module" src="batch.js"></script>
  </body>
</html>
